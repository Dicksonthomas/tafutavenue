<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="gen" markerWidth="14" markerHeight="12" refX="12" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#ffffff" stroke="#64748b" stroke-width="1.2"/>
    </marker>
  </defs>
  <style>
    .boundary { fill: #f8fafc; stroke: #002d62; stroke-width: 1.8; }
    .boundary-title { fill: #002d62; font-size: 15px; font-weight: 700; }
    .uc { fill: #ffffff; stroke: #da4e1f; stroke-width: 1.4; }
    .uc-super { fill: #fff7ed; stroke: #da4e1f; stroke-width: 1.4; }
    .uc-text { fill: #1e293b; font-size: 11px; text-anchor: middle; }
    .actor-label { fill: #002d62; font-size: 12px; font-weight: 700; text-anchor: middle; }
    .link { stroke: #94a3b8; stroke-width: 1.1; }
    .stick { stroke: #334155; stroke-width: 2; fill: none; stroke-linecap: round; }
  </style>

  <!-- ===== System boundary ===== -->
  <rect class="boundary" x="230" y="20" width="740" height="820" rx="10"/>
  <text x="600" y="46" class="boundary-title" text-anchor="middle">University Venue Booking System</text>

  <!-- ===== Actors ===== -->
  <!-- CR actor, far left -->
  <g transform="translate(70,120)">
    <circle cx="0" cy="0" r="12" class="stick"/>
    <line x1="0" y1="12" x2="0" y2="55" class="stick"/>
    <line x1="-20" y1="28" x2="20" y2="28" class="stick"/>
    <line x1="0" y1="55" x2="-16" y2="90" class="stick"/>
    <line x1="0" y1="55" x2="16" y2="90" class="stick"/>
    <text x="0" y="112" class="actor-label">Class Rep</text>
    <text x="0" y="126" class="actor-label">(CR)</text>
  </g>

  <!-- Admin actor, far right -->
  <g transform="translate(1130,300)">
    <circle cx="0" cy="0" r="12" class="stick"/>
    <line x1="0" y1="12" x2="0" y2="55" class="stick"/>
    <line x1="-20" y1="28" x2="20" y2="28" class="stick"/>
    <line x1="0" y1="55" x2="-16" y2="90" class="stick"/>
    <line x1="0" y1="55" x2="16" y2="90" class="stick"/>
    <text x="0" y="112" class="actor-label">Admin</text>
  </g>

  <!-- Super Admin actor, bottom right -->
  <g transform="translate(1130,600)">
    <circle cx="0" cy="0" r="12" class="stick"/>
    <line x1="0" y1="12" x2="0" y2="55" class="stick"/>
    <line x1="-20" y1="28" x2="20" y2="28" class="stick"/>
    <line x1="0" y1="55" x2="-16" y2="90" class="stick"/>
    <line x1="0" y1="55" x2="16" y2="90" class="stick"/>
    <text x="0" y="112" class="actor-label">Super Admin</text>
  </g>

  <!-- Generalization: Super Admin "is a" Admin -->
  <path d="M1120,540 C1080,470 1080,410 1120,360" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#gen)"/>
  <text x="1010" y="450" font-size="10" fill="#64748b">extends</text>

  <!-- ===== CR use cases ===== -->
  <g>
    <ellipse class="uc" cx="330" cy="95" rx="82" ry="26"/>
    <text x="330" y="99" class="uc-text">Register Account</text>

    <ellipse class="uc" cx="330" cy="160" rx="70" ry="26"/>
    <text x="330" y="164" class="uc-text">Login</text>

    <ellipse class="uc" cx="330" cy="225" rx="95" ry="28"/>
    <text x="330" y="223" class="uc-text">Find &amp; Book a</text>
    <text x="330" y="236" class="uc-text">Free Venue</text>

    <ellipse class="uc" cx="330" cy="295" rx="90" ry="26"/>
    <text x="330" y="299" class="uc-text">Sign Booking</text>

    <ellipse class="uc" cx="330" cy="360" rx="95" ry="26"/>
    <text x="330" y="364" class="uc-text">View My Bookings</text>

    <ellipse class="uc" cx="330" cy="425" rx="90" ry="26"/>
    <text x="330" y="429" class="uc-text">Cancel a Booking</text>

    <ellipse class="uc" cx="330" cy="490" rx="95" ry="26"/>
    <text x="330" y="494" class="uc-text">View Notifications</text>

    <ellipse class="uc" cx="330" cy="555" rx="110" ry="28"/>
    <text x="330" y="553" class="uc-text">View Timetable /</text>
    <text x="330" y="566" class="uc-text">Lecturer Schedule</text>

    <!-- links from CR -->
    <line class="link" x1="82" y1="120" x2="248" y2="95"/>
    <line class="link" x1="82" y1="130" x2="260" y2="160"/>
    <line class="link" x1="82" y1="140" x2="235" y2="225"/>
    <line class="link" x1="82" y1="150" x2="240" y2="295"/>
    <line class="link" x1="82" y1="160" x2="235" y2="360"/>
    <line class="link" x1="82" y1="170" x2="240" y2="425"/>
    <line class="link" x1="82" y1="180" x2="235" y2="490"/>
    <line class="link" x1="82" y1="190" x2="220" y2="555"/>
  </g>

  <!-- Book Venue includes Sign Booking -->
  <line x1="330" y1="253" x2="330" y2="269" stroke="#94a3b8" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="336" y="264" font-size="9" fill="#94a3b8">«includes»</text>

  <!-- ===== Shared Admin/Super Admin use cases (middle column) ===== -->
  <g>
    <ellipse class="uc" cx="600" cy="95" rx="105" ry="27"/>
    <text x="600" y="99" class="uc-text">Approve / Reject Booking</text>

    <ellipse class="uc" cx="600" cy="160" rx="90" ry="26"/>
    <text x="600" y="164" class="uc-text">Manage Venues</text>

    <ellipse class="uc" cx="600" cy="225" rx="95" ry="26"/>
    <text x="600" y="229" class="uc-text">Import Timetable</text>

    <ellipse class="uc" cx="600" cy="290" rx="90" ry="26"/>
    <text x="600" y="294" class="uc-text">Manage Semesters</text>

    <ellipse class="uc" cx="600" cy="355" rx="105" ry="26"/>
    <text x="600" y="359" class="uc-text">Manage CRs (Students)</text>

    <ellipse class="uc" cx="600" cy="420" rx="95" ry="26"/>
    <text x="600" y="424" class="uc-text">View Activity Logs</text>

    <ellipse class="uc" cx="600" cy="485" rx="100" ry="28"/>
    <text x="600" y="483" class="uc-text">Post Announcement</text>
    <text x="600" y="496" class="uc-text">(to CRs or Admins)</text>

    <ellipse class="uc" cx="600" cy="555" rx="115" ry="26"/>
    <text x="600" y="559" class="uc-text">Manage Own Announcements</text>

    <ellipse class="uc" cx="600" cy="620" rx="115" ry="28"/>
    <text x="600" y="618" class="uc-text">Configure Settings</text>
    <text x="600" y="631" class="uc-text">&amp; Branding</text>
  </g>

  <!-- ===== Super-Admin-only use cases ===== -->
  <g>
    <ellipse class="uc-super" cx="870" cy="160" rx="105" ry="26"/>
    <text x="870" y="164" class="uc-text">Manage Admin Accounts</text>

    <ellipse class="uc-super" cx="870" cy="225" rx="110" ry="28"/>
    <text x="870" y="223" class="uc-text">University-wide</text>
    <text x="870" y="236" class="uc-text">Branding</text>

    <ellipse class="uc-super" cx="870" cy="295" rx="115" ry="26"/>
    <text x="870" y="299" class="uc-text">Run Database Migrations</text>

    <ellipse class="uc-super" cx="870" cy="360" rx="100" ry="26"/>
    <text x="870" y="364" class="uc-text">View All Campuses</text>
  </g>

  <!-- links from Admin (to shared + hits the shared column) -->
  <g class="link">
    <line x1="1118" y1="330" x2="705" y2="95"/>
    <line x1="1118" y1="335" x2="690" y2="160"/>
    <line x1="1118" y1="340" x2="695" y2="225"/>
    <line x1="1118" y1="345" x2="690" y2="290"/>
    <line x1="1118" y1="350" x2="705" y2="355"/>
    <line x1="1118" y1="355" x2="695" y2="420"/>
    <line x1="1118" y1="360" x2="700" y2="485"/>
    <line x1="1118" y1="365" x2="715" y2="555"/>
    <line x1="1118" y1="370" x2="715" y2="620"/>
  </g>

  <!-- links from Super Admin to super-admin-only use cases -->
  <g class="link">
    <line x1="1118" y1="620" x2="975" y2="160"/>
    <line x1="1118" y1="625" x2="980" y2="225"/>
    <line x1="1118" y1="630" x2="985" y2="295"/>
    <line x1="1118" y1="635" x2="970" y2="360"/>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(280,750)">
    <rect width="640" height="70" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#002d62">Legend</text>
    <ellipse cx="34" cy="38" rx="20" ry="10" class="uc"/>
    <text x="62" y="42" font-size="10.5" fill="#334155">Available to Admin (and, by extension, Super Admin)</text>
    <ellipse cx="34" cy="58" rx="20" ry="10" class="uc-super"/>
    <text x="62" y="62" font-size="10.5" fill="#334155">Super Admin only</text>
    <text x="380" y="42" font-size="10.5" fill="#334155">→ solid line: actor performs the use case</text>
    <text x="380" y="58" font-size="10.5" fill="#334155">⊳ hollow-arrow line: Super Admin "extends" Admin</text>
  </g>
</svg>
